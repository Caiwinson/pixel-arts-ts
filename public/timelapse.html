<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Timelapse — Pixel Arts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/timelapse.css" />
</head>
<body>
<div class="wrapper">
    <header>
        <h1>TIMELAPSE</h1>
        <p>Pixel Arts — Canvas Replay</p>
    </header>

    <div id="errorMsg">Failed to load timelapse data.</div>

    <div class="main">
        <div class="canvas-wrap">
            <canvas id="pixelCanvas" width="500" height="500"></canvas>
            <div id="loadingOverlay">
                <div class="spinner"></div>
                <div id="loadingText">Loading history…</div>
            </div>
        </div>

        <div class="controls">
            <div class="stat-row">
                <div class="stat">
                    <div class="stat-label">Frame</div>
                    <div class="stat-value" id="statFrame">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Total</div>
                    <div class="stat-value" id="statTotal">—</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Size</div>
                    <div class="stat-value" id="statSize">—</div>
                </div>
            </div>

            <div class="speed-section">
                <div class="section-label">Playback Speed</div>

                <div class="slider-row">
                    <input type="range" id="speedSlider" min="1" max="100" step="1" value="1" />
                    <span class="slider-readout" id="sliderReadout">1 fps</span>
                </div>

                <div class="speed-buttons" id="speedBtns">
                    <button class="speed-btn active" data-fps="1">1×</button>
                    <button class="speed-btn" data-fps="2">2×</button>
                    <button class="speed-btn" data-fps="4">4×</button>
                    <button class="speed-btn" data-fps="8">8×</button>
                    <button class="speed-btn" data-fps="16">16×</button>
                    <button class="speed-btn" data-id="max">Max</button>
                </div>
            </div>

            <button class="play-btn" id="playBtn">
                <span id="playIcon">▶</span>
                <span id="playLabel">Play</span>
            </button>

            <a class="dl-btn" id="dlBtn" href="#">↓ Download MP4</a>
        </div>
    </div>
</div>

<script>
(async () => {
    const messageId = window.location.pathname.split('/').pop();
    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const errorMsg = document.getElementById('errorMsg');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const playLabel = document.getElementById('playLabel');
    const statFrame = document.getElementById('statFrame');
    const statTotal = document.getElementById('statTotal');
    const statSize = document.getElementById('statSize');
    const dlBtn = document.getElementById('dlBtn');
    const speedSlider = document.getElementById('speedSlider');
    const sliderReadout = document.getElementById('sliderReadout');

    // Detect vsync cap via a quick rAF timing sample
    async function detectVsyncFps() {
        return new Promise(resolve => {
            const samples = [];
            let last = null;
            let count = 0;
            function tick(ts) {
                if (last !== null) samples.push(ts - last);
                last = ts;
                if (++count < 10) {
                    requestAnimationFrame(tick);
                } else {
                    const avg = samples.reduce((a, b) => a + b, 0) / samples.length;
                    // Round to nearest common refresh rate
                    const raw = 1000 / avg;
                    const common = [30, 60, 90, 120, 144, 165, 240];
                    const nearest = common.reduce((a, b) => Math.abs(b - raw) < Math.abs(a - raw) ? b : a);
                    resolve(nearest);
                }
            }
            requestAnimationFrame(tick);
        });
    }

    let frames = [];
    let size = 0;
    let scale = 1;
    let currentFrame = 0;
    let playing = false;
    let fps = 1;
    let totalFrames = 0;
    let rafId = null;
    let lastTimestamp = null;
    let vsyncFps = 60; // default, replaced after detection

    function updateDownloadLink() {
        dlBtn.href = `/download/${messageId}-${fps}`;
        dlBtn.setAttribute('download', `${messageId}-${fps}.mp4`);
    }

    // ---- Fetch history ----
    let history;
    try {
        const res = await fetch(`/canvas-history/${messageId}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        history = await res.json();
    } catch (err) {
        loadingOverlay.classList.add('hidden');
        errorMsg.style.display = 'block';
        console.error('Failed to fetch history:', err);
        return;
    }

    // ---- Build frames ----
    loadingText.textContent = 'Building frames…';

    const firstFull = history.find(r => !r.is_delta);
    if (!firstFull) {
        loadingOverlay.classList.add('hidden');
        errorMsg.style.display = 'block';
        return;
    }

    size = Math.round(Math.sqrt(firstFull.key.length / 6));
    scale = size <= 5 ? 100 : size <= 15 ? 50 : 30;
    const dim = size * scale;
    canvas.width = dim;
    canvas.height = dim;

    let pixels = new Array(size * size).fill('ffffff');

    for (const row of history) {
        if (!row.is_delta) {
            const parts = row.key.match(/.{6}/g);
            if (parts && parts.length === size * size) pixels = parts.slice();
        } else {
            for (const entry of row.key.split(',')) {
                const ci = entry.indexOf(':');
                if (ci === -1) continue;
                const idx = parseInt(entry.slice(0, ci));
                const hex = entry.slice(ci + 1);
                if (!isNaN(idx) && hex) pixels[idx] = hex;
            }
        }
        frames.push(pixels.slice());
    }

    totalFrames = frames.length;
    statTotal.textContent = totalFrames;
    statSize.textContent = `${size}×${size}`;

    speedSlider.max = totalFrames;
    speedSlider.value = 1;

    // ---- Render a frame ----
    function renderFrame(index) {
        const f = frames[index];
        if (!f) return;
        for (let i = 0; i < f.length; i++) {
            ctx.fillStyle = `#${f[i]}`;
            ctx.fillRect((i % size) * scale, Math.floor(i / size) * scale, scale, scale);
        }
        currentFrame = index;
        statFrame.textContent = index + 1;
    }

    renderFrame(0);

    // Detect vsync before allowing playback
    loadingText.textContent = 'Detecting display…';
    vsyncFps = await detectVsyncFps();
    loadingOverlay.classList.add('hidden');

    // ---- Animate loop ----
    // When fps > vsyncFps, we can't render every frame in real time.
    // Instead we advance by multiple logical frames per rAF tick so that
    // playback duration stays correct — we just skip intermediate frames.
    function animate(ts) {
        if (!playing) return;
        if (lastTimestamp === null) lastTimestamp = ts;

        const elapsed = ts - lastTimestamp;

        // How many logical frames should have passed since last rAF tick?
        // At fps <= vsyncFps this is <=1 on average (same as before).
        // At fps > vsyncFps this becomes >1, so we skip ahead correctly.
        const framesElapsed = (elapsed / 1000) * fps;

        if (framesElapsed >= 1) {
            lastTimestamp = ts;
            // Advance by the integer number of frames that have elapsed,
            // clamped so we never skip past the end in one jump.
            const step = Math.max(1, Math.round(framesElapsed));
            const next = (currentFrame + step) % totalFrames;
            renderFrame(next);
        }

        rafId = requestAnimationFrame(animate);
    }

    function startPlay() {
        playing = true;
        lastTimestamp = null;
        playIcon.textContent = '⏸';
        playLabel.textContent = 'Pause';
        rafId = requestAnimationFrame(animate);
    }

    function pausePlay() {
        playing = false;
        playIcon.textContent = '▶';
        playLabel.textContent = 'Play';
        if (rafId) cancelAnimationFrame(rafId);
    }

    function setFps(value) {
        fps = Math.max(1, Math.min(value, totalFrames));
        speedSlider.value = fps;
        const secs = (totalFrames / fps).toFixed(1);

        let label;
        if (fps >= vsyncFps) {
            // Show that we're above vsync and will be skipping frames
            const skipRatio = Math.round(fps / vsyncFps);
            label = fps >= totalFrames
                ? `${fps} fps (~1s, skip ${skipRatio - 1})`
                : `${fps} fps (${secs}s, skip ${skipRatio - 1})`;
        } else {
            label = fps >= totalFrames
                ? `${fps} fps (~1s)`
                : `${fps} fps (${secs}s)`;
        }

        sliderReadout.textContent = label;
        lastTimestamp = null;
        updateDownloadLink();
    }

    function syncPresetButtons() {
        document.querySelectorAll('.speed-btn').forEach(btn => {
            const bfps = btn.dataset.id === 'max' ? totalFrames : parseInt(btn.dataset.fps);
            btn.classList.toggle('active', bfps === fps);
        });
    }

    speedSlider.addEventListener('input', () => {
        setFps(parseInt(speedSlider.value));
        syncPresetButtons();
    });

    document.getElementById('speedBtns').addEventListener('click', e => {
        const btn = e.target.closest('.speed-btn');
        if (!btn) return;
        const target = btn.dataset.id === 'max' ? totalFrames : parseInt(btn.dataset.fps);
        setFps(target);
        syncPresetButtons();
    });

    playBtn.addEventListener('click', () => {
        if (playing) pausePlay(); else startPlay();
    });

    // Init
    setFps(1);
    syncPresetButtons();
})();
</script>
</body>
</html>
